<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlyTour">
<meta name="theme-color" content="#2a2622">
<meta name="color-scheme" content="dark">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<title>FlyTour — Passeggiate narrate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --stone:#2a2622;
    --stone-2:#332e28;
    --patina:#7c9a82;
    --patina-dim:#5c7566;
    --ochre:#c97d4b;
    --limestone:#ede6d8;
    --limestone-dim:#b3a996;
    --line: rgba(237,230,216,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html{color-scheme:dark;overscroll-behavior:none}
    html,body{margin:0;padding:0;background:var(--stone);color:var(--limestone);
    font-family:'Inter',-apple-system,sans-serif; min-height:100vh;
    -webkit-font-smoothing:antialiased;}

  .wrap{max-width:520px;margin:0 auto;padding:0 0 60px 0;}

  header{padding:36px 20px 8px;}
  @media (display-mode: standalone){
    header{padding-top:calc(10px + env(safe-area-inset-top));}
  }
  .brand{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px;}
  .logo-img{height:56px; width:auto; display:block;}
  .lang-select{background:var(--stone-2); color:var(--limestone); border:1px solid var(--line);
    border-radius:10px; padding:7px 10px; font-family:'Inter',sans-serif; font-size:13px;
    font-weight:600; cursor:pointer;}

  .eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--patina); font-weight:600; margin-bottom:8px;}
  h1{font-family:'Fraunces',serif; font-weight:600; font-size:28px; line-height:1.1;
    margin:0 0 6px 0; letter-spacing:-0.01em;}
  .subtitle{color:var(--limestone-dim); font-size:14px; margin:0 0 8px 0; line-height:1.5;}

  .search-row{margin:20px 20px 6px;}
  .search-box{display:flex; align-items:center; gap:10px; background:var(--stone-2);
    border:1px solid var(--line); border-radius:14px; padding:12px 14px;}
  .search-box svg{width:16px;height:16px; color:var(--limestone-dim); flex-shrink:0;}
  .search-box input{background:none; border:none; outline:none; color:var(--limestone);
    font-family:'Inter',sans-serif; font-size:13.5px; width:100%; padding:0;}
  .search-box input::placeholder{color:var(--limestone-dim);}
  .search-note{font-size:10.5px; color:var(--limestone-dim); margin:6px 2px 0; text-align:right;}

  .tours{padding:14px 20px 0; display:flex; flex-direction:column; gap:14px;}
  .group-header{font-family:'Fraunces',serif; font-weight:600; font-size:15px;
    color:var(--limestone-dim); letter-spacing:.02em; margin:10px 2px 0;
    display:flex; align-items:center; gap:8px;}
  .group-header:first-child{margin-top:0;}
  .group-header::after{content:""; flex:1; height:1px; background:var(--line);}

  .tour-card{display:block; text-decoration:none; color:inherit; background:var(--stone-2);
    border:1px solid var(--line); border-radius:18px; overflow:hidden;
    transition:transform .15s, border-color .2s;}
  .tour-card:active{transform:scale(0.98);}
  .tour-cover{position:relative; aspect-ratio: 16/9; background:var(--stone);
    display:flex; align-items:flex-end;}
  .tour-cover img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .tour-cover-overlay{position:relative; z-index:1; width:100%; padding:14px 16px 12px;
    background:linear-gradient(transparent, rgba(0,0,0,0.75));}
  .tour-badge{display:inline-block; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em;
    font-weight:700; color:#1a231d; background:var(--patina); padding:3px 9px; border-radius:7px;
    margin-bottom:6px; margin-right:6px;}
  .tour-badge-ochre{background:var(--ochre); color:#241a12;}
  .tour-badge-near{background:var(--limestone); color:#1a231d;}
  .tour-title-onimg{font-family:'Fraunces',serif; font-weight:600; font-size:19px; color:var(--limestone);}
  .tour-body{padding:14px 16px 16px;}
  .tour-desc{font-size:13px; color:var(--limestone-dim); line-height:1.5; margin:0 0 10px;}
  .tour-meta{display:flex; align-items:center; gap:14px; font-size:11.5px; color:var(--limestone-dim);}
  .tour-meta span{display:flex; align-items:center; gap:5px;}
  .tour-meta svg{width:13px;height:13px;}

  .empty-hint{margin:26px 20px 0; padding:16px; border:1px dashed var(--line); border-radius:14px;
    font-size:12.5px; color:var(--limestone-dim); text-align:center; line-height:1.5;}

  footer{text-align:center; padding:34px 20px 10px; font-size:11px; color:var(--limestone-dim);
    opacity:0.55;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="logo-lockup.png" alt="FlyTour" class="logo-img">
      <select id="langSelect" class="lang-select"></select>
    </div>
    <div class="eyebrow" id="txtEyebrow">Audioguide GPS narrate</div>
    <h1 id="txtH1">I tuoi percorsi</h1>
    <p class="subtitle" id="txtSubtitle">Passeggiate a piedi con racconto sincronizzato alla posizione. Scegli un giro per iniziare.</p>
  </header>

  <div class="search-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Cerca un percorso, una città…" autocomplete="off">
    </div>
    <div class="search-note" id="searchNote"></div>
  </div>

  <div class="tours" id="tours"></div>

  <div class="empty-hint" id="emptyHint" style="display:none;">Nessun percorso trovato. Prova con un altro termine.</div>

  <footer id="txtFooter">FlyTour · fatto per camminarci sopra</footer>
</div>

<script>
const AUDIENCE = "guest"; // questa pagina (root) è la vetrina per gli ospiti del B&B
let TOURS = [];
let userPos = null;

// ---- Traduzioni interfaccia (7 lingue, le stesse presenti in tours.json) ----
const LANGS = [
  { code: "it", label: "Italiano" },
  { code: "en", label: "English" },
  { code: "es", label: "Español" },
  { code: "fr", label: "Français" },
  { code: "de", label: "Deutsch" },
  { code: "pt", label: "Português" },
  { code: "zh", label: "中文" }
];
const UI = {
  eyebrow:  { it:"Audioguide GPS narrate", en:"Narrated GPS audio guides", es:"Audioguías GPS narradas", fr:"Audioguides GPS racontés", de:"Erzählte GPS-Audioguides", pt:"Audioguias GPS narrados", zh:"GPS语音导览" },
  h1:       { it:"I tuoi percorsi", en:"Your tours", es:"Tus recorridos", fr:"Vos parcours", de:"Deine Touren", pt:"Os teus percursos", zh:"你的行程" },
  subtitle: { it:"Passeggiate a piedi con racconto sincronizzato alla posizione. Scegli un giro per iniziare.", en:"Walking tours with narration synced to your location. Pick a tour to begin.", es:"Paseos a pie con narración sincronizada a tu ubicación. Elige un recorrido para empezar.", fr:"Promenades à pied avec récit synchronisé à votre position. Choisissez un parcours pour commencer.", de:"Spaziergänge mit ortsbezogener Erzählung. Wähle eine Tour, um zu beginnen.", pt:"Passeios a pé com narração sincronizada à tua localização. Escolhe um percurso para começar.", zh:"步行游览，讲解与您的位置同步。选择一个行程开始吧。" },
  searchPlaceholder: { it:"Cerca un percorso, una città…", en:"Search a tour, a city…", es:"Busca un recorrido, una ciudad…", fr:"Recherchez un parcours, une ville…", de:"Suche nach Tour oder Stadt…", pt:"Procura um percurso, uma cidade…", zh:"搜索行程或城市…" },
  emptyHint: { it:"Nessun percorso trovato. Prova con un altro termine.", en:"No tour found. Try a different search term.", es:"No se ha encontrado ningún recorrido. Prueba con otro término.", fr:"Aucun parcours trouvé. Essayez un autre terme.", de:"Keine Tour gefunden. Versuche einen anderen Suchbegriff.", pt:"Nenhum percurso encontrado. Tenta outro termo.", zh:"未找到行程。请尝试其他搜索词。" },
  footer: { it:"FlyTour · fatto per camminarci sopra", en:"FlyTour · made to walk on", es:"FlyTour · hecho para recorrer", fr:"FlyTour · fait pour être parcouru", de:"FlyTour · zum Erwandern gemacht", pt:"FlyTour · feito para percorrer", zh:"FlyTour · 专为漫步而生" },
  stops: { it:"tappe", en:"stops", es:"paradas", fr:"étapes", de:"Stationen", pt:"paragens", zh:"站" },
  nearest: { it:"📍 Il più vicino a te", en:"📍 Closest to you", es:"📍 El más cercano a ti", fr:"📍 Le plus proche de vous", de:"📍 Am nächsten bei dir", pt:"📍 O mais próximo de ti", zh:"📍 离你最近" }
};

const LANG_STORAGE_KEY = "flytour_root_lang";
function detectDefaultLang(){
  const saved = localStorage.getItem(LANG_STORAGE_KEY);
  if(saved && LANGS.some(l => l.code === saved)) return saved;
  const browserLang = (navigator.language || "en").slice(0,2).toLowerCase();
  return LANGS.some(l => l.code === browserLang) ? browserLang : "en";
}
let currentLang = detectDefaultLang();

function applyStaticTexts(){
  document.getElementById('txtEyebrow').textContent = UI.eyebrow[currentLang];
  document.getElementById('txtH1').textContent = UI.h1[currentLang];
  document.getElementById('txtSubtitle').textContent = UI.subtitle[currentLang];
  document.getElementById('searchInput').placeholder = UI.searchPlaceholder[currentLang];
  document.getElementById('emptyHint').textContent = UI.emptyHint[currentLang];
  document.getElementById('txtFooter').textContent = UI.footer[currentLang];
}

const langSelect = document.getElementById('langSelect');
LANGS.forEach(l => {
  const opt = document.createElement('option');
  opt.value = l.code;
  opt.textContent = l.label;
  langSelect.appendChild(opt);
});
langSelect.value = currentLang;
langSelect.addEventListener('change', () => {
  currentLang = langSelect.value;
  localStorage.setItem(LANG_STORAGE_KEY, currentLang);
  applyStaticTexts();
  render();
});

function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function T(t, field){
  return (t[field] && t[field][currentLang]) ? t[field][currentLang] : t[field]['it'];
}

function filterTours(query){
  const base = TOURS.filter(t => t.audience === AUDIENCE);
  if(!query) return base.slice();
  const q = query.toLowerCase();
  return base.filter(t =>
    T(t,'title').toLowerCase().includes(q) ||
    T(t,'desc').toLowerCase().includes(q) ||
    t.city.toLowerCase().includes(q) ||
    t.country.toLowerCase().includes(q)
  );
}

function cardHtml(t, isNearest){
  return `
    <a class="tour-card" href="${t.url}">
      <div class="tour-cover">
        <img src="${t.cover}" alt="" loading="lazy">
        <div class="tour-cover-overlay">
          <span class="tour-badge">${t.city}</span>
          <span class="tour-badge tour-badge-ochre">${t.stops} ${UI.stops[currentLang]}</span>
          ${isNearest ? `<span class="tour-badge tour-badge-near">${UI.nearest[currentLang]}</span>` : ''}
          <div class="tour-title-onimg">${T(t,'title')}</div>
        </div>
      </div>
      <div class="tour-body">
        <p class="tour-desc">${T(t,'desc')}</p>
        <div class="tour-meta">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>${t.duration}</span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 12a9 9 0 0118 0"/></svg>${t.distance}</span>
        </div>
      </div>
    </a>
  `;
}

function render(){
  const query = document.getElementById('searchInput').value.trim();
  const filtered = cityLock ? TOURS.filter(t => t.audience === AUDIENCE && t.city.toLowerCase() === cityLock.toLowerCase()) : filterTours(query);
  const el = document.getElementById('tours');
  const emptyHint = document.getElementById('emptyHint');

  if(filtered.length === 0){
    el.innerHTML = '';
    emptyHint.style.display = 'block';
    return;
  }
  emptyHint.style.display = 'none';

  // calcolo distanze se disponibile la posizione
  let withDist = filtered;
  let nearestSlug = null;
  if(userPos){
    withDist = filtered.map(t => ({...t, dist: haversineKm(userPos.lat, userPos.lon, t.lat, t.lon)}));
    nearestSlug = withDist.reduce((a,b) => a.dist < b.dist ? a : b).slug;
  }

  // raggruppo per paese, mantenendo l'ordine di prima apparizione
  const groups = {};
  const countryOrder = [];
  withDist.forEach(t => {
    if(!groups[t.country]){ groups[t.country] = []; countryOrder.push(t.country); }
    groups[t.country].push(t);
  });

  // ordino i gruppi e i tour interni per vicinanza, se nota
  let orderedCountries = countryOrder;
  if(userPos){
    countryOrder.forEach(c => groups[c].sort((a,b) => a.dist - b.dist));
    orderedCountries = [...countryOrder].sort((a,b) => {
      const da = Math.min(...groups[a].map(t => t.dist));
      const db = Math.min(...groups[b].map(t => t.dist));
      return da - db;
    });
  }

  el.innerHTML = orderedCountries.map(country => `
    <div class="group-header">${country}</div>
    ${groups[country].map(t => cardHtml(t, t.slug === nearestSlug)).join('')}
  `).join('');
}

function requestLocation(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      render();
    },
    () => { /* posizione negata o non disponibile: nessun problema, resta l'ordine di default */ },
    { timeout: 6000, maximumAge: 300000 }
  );
}

let cityLock = null;
const urlParams = new URLSearchParams(location.search);
const cityParam = urlParams.get('city');
if(cityParam){
  cityLock = cityParam;
  document.getElementById('searchInput').value = cityParam;
}

document.getElementById('searchInput').addEventListener('input', () => { cityLock = null; render(); });

async function caricaTours(){
  try{
    const resp = await fetch('https://fly98.github.io/FlyTour/tours.json');
    TOURS = await resp.json();
  }catch(e){
    TOURS = [];
  }
  render();
}
applyStaticTexts();
caricaTours();
requestLocation();

</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
<!-- rebuild trigger -->
</html>
